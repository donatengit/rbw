name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
        build_type:
          - release
          - debug
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang (musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install clang-18

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (armv7 only)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        uses: cargo-bins/cargo-binstall@main
      - if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: cargo binstall cross

      - name: Build
        run: |
          FLAGS=""
          if [ "${{ matrix.build_type }}" = "release" ]; then
            FLAGS="--release"
          fi

          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo build $FLAGS --target ${{ matrix.target }} --all-features

          elif [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            TARGET_CC=clang-18 TARGET_AR=llvm-ar-18 \
              cargo build $FLAGS --target ${{ matrix.target }} --all-features

          elif [ "${{ matrix.target }}" = "armv7-unknown-linux-gnueabihf" ]; then
            cross build $FLAGS --target ${{ matrix.target }} --all-features
          fi

      - name: Package
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/${{ matrix.build_type }}"
          PKG_NAME="rbw-${{ github.ref_name }}-${{ matrix.target }}"
          if [ "${{ matrix.build_type }}" = "debug" ]; then
            PKG_NAME="${PKG_NAME}-debug"
          fi
          mkdir -p "$PKG_NAME"
          cp "$TARGET_DIR/rbw" "$PKG_NAME/"
          cp "$TARGET_DIR/rbw-agent" "$PKG_NAME/"
          cp bin/* "$PKG_NAME/"
          cp README.md LICENSE CHANGELOG.md "$PKG_NAME/"
          tar -czf "${PKG_NAME}.tar.gz" "$PKG_NAME"
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"
          echo "ASSET_PATH=${PKG_NAME}.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM_PATH=${PKG_NAME}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
