name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
        build_type:
          - release
          - debug
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cross

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            CMD="cargo"
          else
            CMD="cross"
          fi
          
          if [ "${{ matrix.build_type }}" = "release" ]; then
            $CMD build --release --target ${{ matrix.target }} --all-features
          else
            $CMD build --target ${{ matrix.target }} --all-features
          fi

      - name: Package
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/${{ matrix.build_type }}"
          PKG_NAME="rbw-${{ github.ref_name }}-${{ matrix.target }}"
          if [ "${{ matrix.build_type }}" = "debug" ]; then
            PKG_NAME="${PKG_NAME}-debug"
          fi
          
          mkdir -p "$PKG_NAME"
          cp "$TARGET_DIR/rbw" "$PKG_NAME/"
          cp "$TARGET_DIR/rbw-agent" "$PKG_NAME/"
          # Copy helper scripts
          cp bin/* "$PKG_NAME/"
          # Copy docs
          cp README.md LICENSE CHANGELOG.md "$PKG_NAME/"
          
          tar -czf "${PKG_NAME}.tar.gz" "$PKG_NAME"
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"
          
          echo "ASSET_PATH=${PKG_NAME}.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM_PATH=${PKG_NAME}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
